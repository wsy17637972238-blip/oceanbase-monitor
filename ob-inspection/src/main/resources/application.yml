spring:
  application:
    name: ob-inspection
  datasource:
    # OceanBase 被巡检实例连接不再写死在此，改由 inspection_instance 表纳管（多实例采集）
    h2:
      jdbc-url: jdbc:h2:file:./data/obinspection;DB_CLOSE_DELAY=-1;MODE=MySQL
      username: sa
      password:
      driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

springdoc:
  swagger-ui:
    path: /swagger-ui.html

deepseek:
  enabled: ${DEEPSEEK_ENABLED:true}   # AI 诊断总开关，关闭时 diagnose 落 FAILED 并注明原因
  api:
    key: ${DEEPSEEK_API_KEY:sk-your-key-here}
    url: https://api.deepseek.com/chat/completions
    model: deepseek-chat
